<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: hsl(40, 30%, 96%);
    color: hsl(0, 0%, 10%);
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
    padding: 80px 96px;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .container { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .top {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: hsl(30, 8%, 45%);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rule { flex: 1; height: 1px; background: hsl(30, 10%, 70%); margin: 0 24px; }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 220px;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }
  .desc {
    margin-top: 32px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 36px;
    line-height: 1.3;
    color: hsl(30, 15%, 25%);
    max-width: 780px;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: hsl(30, 8%, 45%);
  }
  .domain { color: hsl(30, 30%, 35%); font-weight: 500; }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <span>Est. 2025</span>
      <span class="rule"></span>
      <span>Volume I</span>
    </div>
    <div>
      <h1>Echo</h1>
      <p class="desc">Your personal journal for capturing moments, moods, and memories.</p>
    </div>
    <div class="bottom">
      <span class="domain">echo-entries.com</span>
      <span>A Journaling Experience</span>
    </div>
  </div>
</body>
</html>
